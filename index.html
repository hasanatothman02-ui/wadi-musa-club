<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عداد زوار نادي وادي موسى</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');
        body { font-family: 'Tajawal', sans-serif; background-color: #f4f7f6; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: white; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); padding: 30px; width: 90%; max-width: 400px; text-align: center; }
        .count { font-size: 70px; font-weight: 700; color: #2c3e50; margin: 10px 0; }
        .label { font-size: 18px; color: #7f8c8d; }
    </style>
</head>
<body>
    <div class="card">
        <div class="label">عدد المتواجدين الآن</div>
        <div id="visitor-count" class="count">...</div>
        <div class="label">نادي وادي موسى</div>
    </div>

    <script>
        // الربط مع قاعدة البيانات لتقرأ الرقم تلقائياً
        const firebaseConfig = { databaseURL: "https://wadi-musa-club-gardens-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database().ref('capacity');

        // تحديث الرقم فوراً عند تغيره من عند الموظف
        db.on('value', (snapshot) => {
            const currentCount = snapshot.val() || 0;
            document.getElementById('visitor-count').innerText = currentCount;
        });
    </script>
</body>
</html>
